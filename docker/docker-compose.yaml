services:
  database:
    image: postgres
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - ./database:/var/lib/postgresql
      - ./database/init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_PASSWORD: motdepasse
  coverage:
    image: soufian1/meshtastic-coverage-service
    restart: unless-stopped
    depends_on:
      - database
    environment:
      - DB_HOST=database
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=motdepasse
      - RUN_INTERVAL=86400  # 24 hours in seconds
    volumes:
      - ./coverage-service/terrain-cache:/root/.splat  # Cache terrain files
    networks:
      - default
  mosquitto:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"
    restart: always
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
  front:
    build:
      context: ../
      dockerfile: Dockerfile.build
#    image: ghcr.io/valentintintin/meshtastic-mqtt-explorer:latest
    restart: always
    ports:
      - "80:8080"
    volumes:
      - ./appsettings.json:/app/appsettings.Production.json
#      - ./mymap.pmtiles:/app/wwwroot/mymap.pmtiles
  recorder:
    image: ghcr.io/valentintintin/meshtastic-mqtt-explorer:latest
    entrypoint: "dotnet"
    command:
      - "Recorder.dll"
    restart: always
    ports:
      - "81:8080"
    volumes:
      - ./appsettings.json:/app/appsettings.Production.json
  worker:
    image: ghcr.io/valentintintin/meshtastic-mqtt-explorer:latest
    entrypoint: "dotnet"
    command:
      - "Worker.dll"
    restart: always
    volumes:
      - ./appsettings.json:/app/appsettings.Production.json
