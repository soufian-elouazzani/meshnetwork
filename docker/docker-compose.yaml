services:
  database:
    image: postgres
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - ./database:/var/lib/postgresql
#      - ./database/init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_PASSWORD: motdepasse
#    entrypoint: /docker-entrypoint-initdb.d/entrypoint.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  coverage:
    image: soufian1/meshtastic-coverage-service:latest
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      - DB_HOST=database
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=motdepasse
      - RUN_INTERVAL=300  # 5 mins
    volumes:
      - ./coverage-service/terrain-cache:/root/.splat  # Cache terrain files
    networks:
      - default
  mosquitto:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"
    restart: always
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
  front:
#    build:
#      context: ../
#      dockerfile: Dockerfile.build
#    image: ghcr.io/valentintintin/meshtastic-mqtt-explorer:latest
    image: chaymae888/meshtastic-front
    restart: always
    ports:
      - "80:8080"
    volumes:
      - ./appsettings.json:/app/appsettings.Production.json
#      - ./mymap.pmtiles:/app/wwwroot/mymap.pmtiles
    depends_on:
      database:
        condition: service_healthy
    networks:
      - default
  coverage-mfe:
    image: chaymae888/meshtastic-coverage-mfe
#    build:
#        context: ../coverage-mfe
#        dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - front
    networks:
      - default
    # Pas de ports exposés — accessible uniquement via l'iframe depuis le shell Blazor
    # Si tu veux le tester directement depuis le navigateur :
    ports:
      - "3001:80"
  recorder:
    image: ghcr.io/valentintintin/meshtastic-mqtt-explorer:latest
    entrypoint: "dotnet"
    command:
      - "Recorder.dll"
    restart: always
    ports:
      - "81:8080"
    volumes:
      - ./appsettings.json:/app/appsettings.Production.json
    depends_on:
      database:
        condition: service_healthy
  worker:
    image: ghcr.io/valentintintin/meshtastic-mqtt-explorer:latest
    entrypoint: "dotnet"
    command:
      - "Worker.dll"
    restart: always
    volumes:
      - ./appsettings.json:/app/appsettings.Production.json
    depends_on:
      database:
        condition: service_healthy
  redundancy:
    image: soufian1/meshtastic-redundancy-service:latest
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      - DB_HOST=database
      - DB_PASSWORD=motdepasse
      - RUN_INTERVAL=60
    networks:
      - default



